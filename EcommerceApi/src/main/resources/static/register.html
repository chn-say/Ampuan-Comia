<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shoe Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; padding: 30px; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
        .auth-container h2 { margin-bottom: 20px; font-family: sans-serif; color: #333; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #222; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .auth-btn:hover { background: #444; }
        .message { margin-top: 15px; font-size: 14px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>Create Account</h2>
    <form id="register-form">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="reg-role">
                <option value="ROLE_USER">Shopper / User</option>
                <option value="ROLE_ADMIN">Admin / Seller</option>
            </select>
        </div>
        <button type="submit" class="auth-btn">Register</button>
    </form>
    <div id="reg-message" class="message"></div>
    <p style="margin-top: 15px; font-size: 14px;">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="auth-register.js"></script>
</body>
</html>
